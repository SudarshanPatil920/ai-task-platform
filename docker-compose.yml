version: "3.9"

services:

  # 🟢 MongoDB
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 🔴 Redis
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  # ⚙️ Backend (Node.js)
  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis

  # 🐍 Worker (Python)
  worker:
    build: ./worker
    container_name: worker
    restart: always
    env_file:
      - ./worker/.env
    depends_on:
      - mongo
      - redis

  # ⚛️ Frontend (React)
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: