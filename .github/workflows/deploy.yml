name: Docker Image Publish

on:
  push:
    branches:
      - main

jobs:
  publish-images:
    runs-on: ubuntu-latest
    env:
      INFRA_REPO: ${{ secrets.INFRA_REPO }}
      INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backend lint check
        working-directory: ./backend
        run: |
          npm ci
          npm run lint

      - name: Frontend lint check
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-frontend:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-worker:${{ github.sha }}

      - name: Checkout infrastructure repository
        if: ${{ env.INFRA_REPO != '' && env.INFRA_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ env.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update image tags in infrastructure repository
        if: ${{ env.INFRA_REPO != '' && env.INFRA_REPO_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          INFRA_MANIFEST_PATH: ${{ vars.INFRA_MANIFEST_PATH || 'infra/k8s' }}
        run: |
          set -euo pipefail
          cd infra-repo

          perl -0pi -e "s#image: .*ai-task-platform-backend.*#image: ${DOCKERHUB_USERNAME}/ai-task-platform-backend:${IMAGE_TAG}#g" "${INFRA_MANIFEST_PATH}/backend-deployment.yaml"
          perl -0pi -e "s#image: .*ai-task-platform-frontend.*#image: ${DOCKERHUB_USERNAME}/ai-task-platform-frontend:${IMAGE_TAG}#g" "${INFRA_MANIFEST_PATH}/frontend-deployment.yaml"
          perl -0pi -e "s#image: .*ai-task-platform-worker.*#image: ${DOCKERHUB_USERNAME}/ai-task-platform-worker:${IMAGE_TAG}#g" "${INFRA_MANIFEST_PATH}/worker-deployment.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${INFRA_MANIFEST_PATH}"
          git commit -m "chore: update app images to ${IMAGE_TAG}" || exit 0
          git push
